{{- if .Values.supportTool.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mender.fullname" . }}-support
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mender.labels" . | nindent 4 }}
data:
  mender_server_support_tool.sh: |
{{ .Files.Get "files/mender_server_support_tool.sh" | indent 4 }}
{{- end }}
