{{- if .Values.supportTool.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "mender.fullname" . }}-support
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mender.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "mender.fullname" . }}-support
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mender.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["pods"]
  # create/delete: the tool spawns a disposable pod to dump MongoDB.
  verbs: ["get", "list", "watch", "create", "delete"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["pods/attach"]
  # `kubectl run --attach` reads the mongosh pod's output.
  verbs: ["create"]
- apiGroups: [""]
  resources: ["pods/exec"]
  # `kubectl exec` into the tenantadm pod to run `tenantadm list-tenants`.
  verbs: ["create"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  # locate the tenantadm deployment before exec'ing into it.
  verbs: ["get", "list"]
- apiGroups: [""]
  # secrets: helm release data + the mongodb-common credentials the tool reads.
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "mender.fullname" . }}-support
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mender.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "mender.fullname" . }}-support
subjects:
- kind: ServiceAccount
  name: {{ include "mender.fullname" . }}-support
  namespace: {{ .Release.Namespace }}
{{- end }}
