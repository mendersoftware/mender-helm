  - it: deviceconnect uses nats.URL when set
    template: templates/deviceconnect/deployment.yaml
    set:
      deviceconnect.enabled: true
      nats.enabled: false
      nats.URL: "nats://external-nats.svc:4222"
      nats.existingSecret: ""
      global.nats.URL: ""
      global.nats.existingSecret: ""
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DEVICECONNECT_NATS_URI
            value: "nats://external-nats.svc:4222"

