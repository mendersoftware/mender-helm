suite: test NATS URI injection - all consuming services
tests:
  - it: deviceconnect uses nats.existingSecret
    template: templates/deviceconnect/deployment.yaml
    set:
      deviceconnect.enabled: true
      nats.existingSecret: "my-nats-secret"
      global.nats.existingSecret: ""
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DEVICECONNECT_NATS_URI
            valueFrom:
              secretKeyRef:
                key: NATS_URI
                name: my-nats-secret

  - it: inventory uses nats.existingSecret
    template: templates/inventory/deployment.yaml
    set:
      inventory.enabled: true
      nats.existingSecret: "my-nats-secret"
      global.nats.existingSecret: ""
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: INVENTORY_NATS_URI
            valueFrom:
              secretKeyRef:
                key: NATS_URI
                name: my-nats-secret

  - it: iot-manager uses nats.existingSecret
    template: templates/iot-manager/deployment.yaml
    set:
      iot_manager.enabled: true
      nats.existingSecret: "my-nats-secret"
      global.nats.existingSecret: ""
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: IOT_MANAGER_NATS_URI
            valueFrom:
              secretKeyRef:
                key: NATS_URI
                name: my-nats-secret

  - it: create-artifact-worker uses nats.existingSecret
    template: templates/create-artifact-worker/deployment.yaml
    set:
      create_artifact_worker.enabled: true
      nats.existingSecret: "my-nats-secret"
      global.nats.existingSecret: ""
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: WORKFLOWS_NATS_URI
            valueFrom:
              secretKeyRef:
                key: NATS_URI
                name: my-nats-secret

  - it: generate-delta-worker uses nats.existingSecret
    template: templates/generate-delta-worker/statefulset.yaml
    set:
      generate_delta_worker.enabled: true
      global.enterprise: true
      nats.existingSecret: "my-nats-secret"
      global.nats.existingSecret: ""
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: WORKFLOWS_NATS_URI
            valueFrom:
              secretKeyRef:
                key: NATS_URI
                name: my-nats-secret

  - it: deviceconnect falls back to global.nats.existingSecret when nats.existingSecret unset
    template: templates/deviceconnect/deployment.yaml
    set:
      deviceconnect.enabled: true
      nats.existingSecret: ""
      global.nats.existingSecret: "legacy-secret"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DEVICECONNECT_NATS_URI
            valueFrom:
              secretKeyRef:
                key: NATS_URI
                name: legacy-secret

  - it: create-artifact-worker falls back to global.nats.existingSecret when nats.existingSecret unset
    template: templates/create-artifact-worker/deployment.yaml
