  - it: deviceconnect falls back to global.nats.URL when nats.URL is unset
    template: templates/deviceconnect/deployment.yaml
    set:
      deviceconnect.enabled: true
      nats.enabled: false
      nats.URL: ""
      global.nats.URL: "nats://legacy-external:4222"
      nats.existingSecret: ""
      global.nats.existingSecret: ""
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DEVICECONNECT_NATS_URI
            value: "nats://legacy-external:4222"

  - it: deviceconnect uses internal NATS URL when nats.enabled and no secret
    template: templates/deviceconnect/deployment.yaml
    set:
      deviceconnect.enabled: true
      nats.enabled: true
      nats.URL: ""
      nats.existingSecret: ""
      global.nats.URL: ""
      global.nats.existingSecret: ""
      nats.fullnameOverride: "mender-nats"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DEVICECONNECT_NATS_URI
            value: "nats://mender-nats"

