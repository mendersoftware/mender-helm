suite: test featureGates.k8sTlsSecrets - promoted to stable in v8
tests:
  # --- Secret: type field ---
  - it: api-gateway Secret uses kubernetes.io/tls type
    template: templates/api-gateway/secret.yaml
    set:
      api_gateway.enabled: true
      api_gateway.env.SSL: true
      api_gateway.certs.cert: "test-cert"
      api_gateway.certs.key: "test-key"
    asserts:
      - equal:
          path: type
          value: kubernetes.io/tls

  # --- Secret: key names (JSONPath bracket notation for dotted keys) ---
  - it: api-gateway Secret uses tls.crt key name
    template: templates/api-gateway/secret.yaml
    set:
      api_gateway.enabled: true
      api_gateway.env.SSL: true
      api_gateway.certs.cert: "test-cert"
      api_gateway.certs.key: "test-key"
    asserts:
      - isNotNull:
          path: "data['tls.crt']"

  - it: api-gateway Secret uses tls.key key name
    template: templates/api-gateway/secret.yaml
    set:
      api_gateway.enabled: true
      api_gateway.env.SSL: true
      api_gateway.certs.cert: "test-cert"
      api_gateway.certs.key: "test-key"
    asserts:
      - isNotNull:
          path: "data['tls.key']"

  - it: api-gateway Secret does not use legacy cert.crt key
    template: templates/api-gateway/secret.yaml
    set:
      api_gateway.enabled: true
      api_gateway.env.SSL: true
      api_gateway.certs.cert: "test-cert"
      api_gateway.certs.key: "test-key"
    asserts:
      - isNull:
          path: "data['cert.crt']"

  - it: api-gateway Secret does not use legacy private.key key
    template: templates/api-gateway/secret.yaml
    set:
      api_gateway.enabled: true
      api_gateway.env.SSL: true
      api_gateway.certs.cert: "test-cert"
      api_gateway.certs.key: "test-key"
    asserts:
      - isNull:
          path: "data['private.key']"

  # --- Secret: gate conditions ---
  - it: api-gateway Secret is not created when SSL is disabled
    template: templates/api-gateway/secret.yaml
    set:
      api_gateway.enabled: true
      api_gateway.env.SSL: false
    asserts:
      - hasDocuments:
          count: 0

  - it: api-gateway Secret is not created when existingSecret is set
    template: templates/api-gateway/secret.yaml
    set:
      api_gateway.enabled: true
      api_gateway.env.SSL: true
      api_gateway.certs.cert: "test-cert"
      api_gateway.certs.key: "test-key"
      api_gateway.certs.existingSecret: "my-tls-secret"
    asserts:
      - hasDocuments:
          count: 0

  # --- ConfigMap: Traefik cert file paths ---
  # data['traefik.yaml'] is the embedded string value; matchRegex operates on it directly.
  - it: api-gateway ConfigMap references tls.crt cert file path
    template: templates/api-gateway/configmap.yaml
    set:
      api_gateway.enabled: true
      api_gateway.env.SSL: true
    asserts:
      - matchRegex:
          path: "data['traefik.yaml']"
          pattern: tls\.crt

  - it: api-gateway ConfigMap references tls.key cert file path
    template: templates/api-gateway/configmap.yaml
    set:
      api_gateway.enabled: true
      api_gateway.env.SSL: true
    asserts:
      - matchRegex:
          path: "data['traefik.yaml']"
          pattern: tls\.key

  - it: api-gateway ConfigMap does not reference legacy cert.crt path
    template: templates/api-gateway/configmap.yaml
    set:
      api_gateway.enabled: true
      api_gateway.env.SSL: true
    asserts:
      - notMatchRegex:
          path: "data['traefik.yaml']"
          pattern: cert\.crt

  - it: api-gateway ConfigMap does not reference legacy private.key path
    template: templates/api-gateway/configmap.yaml
    set:
      api_gateway.enabled: true
      api_gateway.env.SSL: true
    asserts:
      - notMatchRegex:
          path: "data['traefik.yaml']"
          pattern: private\.key
